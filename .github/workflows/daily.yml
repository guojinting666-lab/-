name: 每日新闻推送

on:
  workflow_dispatch:
  schedule:
    # GitHub 使用 UTC 时间；00:00 UTC = 北京时间 08:00
    - cron: "0 0 * * *"

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - name: 生成每日新闻并推送企业微信
        env:
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
        run: |
          python - <<'PY'
          import email.utils
          import html
          import json
          import os
          import re
          import urllib.parse
          import urllib.request
          import xml.etree.ElementTree as ET
          from datetime import datetime, timedelta, timezone

          BEIJING = timezone(timedelta(hours=8))
          WECOM_WEBHOOK = os.environ.get("WECOM_WEBHOOK")

          WEATHER_CODES = {
              0: "晴", 1: "大部晴朗", 2: "局部多云", 3: "阴",
              45: "雾", 48: "雾凇", 51: "小毛毛雨", 53: "毛毛雨",
              55: "较强毛毛雨", 61: "小雨", 63: "中雨", 65: "大雨",
              71: "小雪", 73: "中雪", 75: "大雪", 80: "阵雨",
              81: "较强阵雨", 82: "强阵雨", 95: "雷阵雨",
          }
          WEEKDAYS = ["星期一", "星期二", "星期三", "星期四", "星期五", "星期六", "星期日"]
          CN_MONTHS = ["一月", "二月", "三月", "四月", "五月", "六月", "七月", "八月", "九月", "十月", "十一月", "十二月"]
          CN_DAYS = ["", "一日", "二日", "三日", "四日", "五日", "六日", "七日", "八日", "九日", "十日",
                     "十一日", "十二日", "十三日", "十四日", "十五日", "十六日", "十七日", "十八日", "十九日", "二十日",
                     "二十一日", "二十二日", "二十三日", "二十四日", "二十五日", "二十六日", "二十七日", "二十八日", "二十九日", "三十日", "三十一日"]

          TOPIC_QUERIES = [
              ("tech", "AI 人工智能 科技 互联网 手机 芯片 机器人 新能源 游戏"),
              ("football", "足球 世界杯 欧冠 英超 西甲 中超 国足 转会 懂球帝 直播吧"),
              ("world", "国际新闻 美国 欧洲 日本 韩国 中东 俄乌 全球 热点"),
              ("business", "商业 公司 字节 腾讯 阿里 苹果 特斯拉 英伟达 OpenAI 市场"),
              ("life", "年轻人 消费 电影 音乐 游戏 教育 就业 社交平台"),
          ]

          POSITIVE = [
              "AI", "人工智能", "OpenAI", "大模型", "机器人", "芯片", "英伟达", "苹果", "华为",
              "小米", "特斯拉", "新能源汽车", "互联网", "游戏", "电影", "票房", "社交平台",
              "足球", "世界杯", "欧冠", "英超", "西甲", "中超", "国足", "转会", "国际",
              "美国", "欧洲", "日本", "韩国", "中东", "俄乌", "公司", "商业", "上市",
              "裁员", "涨价", "降价", "发布", "官宣", "回应", "调查", "禁令", "新规",
          ]

          NEGATIVE = [
              "学习贯彻", "重要讲话", "会议指出", "会议强调", "高质量发展", "现代化建设",
              "扎实推进", "谱写新篇", "开创新局面", "凝心聚力", "工作会议", "座谈会",
              "调研时强调", "精神文明", "主题教育", "党建", "党纪", "公报", "白皮书",
              "宏观政策", "稳中求进", "营商环境持续优化", "乡村振兴工作", "每日一言",
              "历史上的今天", "今日油价", "彩票", "星座", "养生", "鸡汤",
          ]

          def http_get(url, timeout=25):
              req = urllib.request.Request(
                  url,
                  headers={
                      "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/125 Safari/537.36",
                      "Accept": "application/json,text/html,application/xml,text/xml,*/*",
                      "Accept-Language": "zh-CN,zh;q=0.9",
                  },
              )
              with urllib.request.urlopen(req, timeout=timeout) as resp:
                  return resp.read().decode("utf-8", errors="replace")

          def clean_text(text):
              text = html.unescape(str(text or ""))
              text = re.sub(r"<[^>]+>", "", text)
              text = re.sub(r"^\s*\d+[、.．]\s*", "", text)
              text = re.sub(r"\s+-\s+[^-]+$", "", text)
              text = re.sub(r"\s+", " ", text).strip()
              return text.strip("；;，,。 ")

          def has_chinese(text):
              return re.search(r"[\u4e00-\u9fff]", text or "") is not None

          def useful_score(text, topic):
              if not text or len(text) < 10 or len(text) > 110 or not has_chinese(text):
                  return -999
              if any(x in text for x in NEGATIVE):
                  return -50
              score = 0
              if any(x in text for x in POSITIVE):
                  score += 8
              if topic == "tech" and any(x in text for x in ["AI", "人工智能", "芯片", "机器人", "手机", "游戏", "苹果", "华为", "英伟达"]):
                  score += 8
              if topic == "football" and any(x in text for x in ["足球", "世界杯", "欧冠", "英超", "中超", "国足", "转会", "比分", "进球"]):
                  score += 8
              if topic == "world" and any(x in text for x in ["美国", "欧洲", "日本", "韩国", "中东", "俄乌", "国际"]):
                  score += 6
              if re.search(r"\d", text):
                  score += 2
              if any(x in text for x in ["回应", "官宣", "发布", "确认", "首次", "新规", "禁令", "调查"]):
                  score += 3
              return score

          def rss_url(query):
              params = {"q": query, "hl": "zh-CN", "gl": "CN", "ceid": "CN:zh-Hans"}
              return "https://news.google.com/rss/search?" + urllib.parse.urlencode(params)

          def fetch_google_news():
              candidates = []
              for topic, query in TOPIC_QUERIES:
                  try:
                      raw = http_get(rss_url(query))
                      root = ET.fromstring(raw)
                      for item in root.findall(".//item")[:30]:
                          title = clean_text(item.findtext("title"))
                          if not title:
                              continue
                          score = useful_score(title, topic)
                          if score > 0:
                              candidates.append((score, title))
                  except Exception:
                      pass
              return candidates

          def fetch_60s_news():
              urls = [
                  "https://api.vvhan.com/api/60s?type=json",
                  "https://api.pearktrue.cn/api/60s/",
              ]
              out = []
              for url in urls:
                  try:
                      raw = http_get(url)
                      try:
                          obj = json.loads(raw)
                          stack = [obj]
                          while stack:
                              cur = stack.pop()
                              if isinstance(cur, dict):
                                  stack.extend(cur.values())
                              elif isinstance(cur, list):
                                  stack.extend(cur)
                              elif isinstance(cur, str):
                                  title = clean_text(cur)
                                  score = useful_score(title, "general")
                                  if score > 0:
                                      out.append((score - 2, title))
                      except Exception:
                          for line in raw.splitlines():
                              title = clean_text(line)
                              score = useful_score(title, "general")
                              if score > 0:
                                  out.append((score - 2, title))
                  except Exception:
                      pass
              return out

          def dedupe_scored(items):
              best = {}
              for score, title in items:
                  key = re.sub(r"\W+", "", title.lower())[:80]
                  if not key:
                      continue
                  if key not in best or score > best[key][0]:
                      best[key] = (score, title)
              return [title for score, title in sorted(best.values(), key=lambda x: x[0], reverse=True)]

          def get_hangzhou_weather():
              url = (
                  "https://api.open-meteo.com/v1/forecast?"
                  "latitude=30.2741&longitude=120.1551"
                  "&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max"
                  "&current=wind_speed_10m"
                  "&timezone=Asia%2FShanghai"
                  "&forecast_days=1"
              )
              try:
                  obj = json.loads(http_get(url))
                  daily = obj.get("daily", {})
                  current = obj.get("current", {})
                  code = int((daily.get("weather_code") or [3])[0])
                  desc = WEATHER_CODES.get(code, "天气待查")
                  tmax = round(float((daily.get("temperature_2m_max") or [0])[0]))
                  tmin = round(float((daily.get("temperature_2m_min") or [0])[0]))
                  pop = daily.get("precipitation_probability_max") or [None]
                  wind = current.get("wind_speed_10m")
                  extra = []
                  if pop[0] is not None:
                      extra.append(f"降水概率{int(pop[0])}%")
                  if wind is not None:
                      extra.append(f"风速{round(float(wind))}km/h")
                  return f"杭州天气：{desc}，{tmin}℃～{tmax}℃" + ("，" + "，".join(extra) if extra else "")
              except Exception:
                  return "杭州天气：暂时获取失败"

          def format_date(now):
              return f"📆{CN_MONTHS[now.month - 1]}{CN_DAYS[now.day]}  {WEEKDAYS[now.weekday()]}"

          def send_wecom(content):
              if not WECOM_WEBHOOK:
                  raise RuntimeError("缺少 GitHub Secret：WECOM_WEBHOOK")
              payload = {"msgtype": "markdown", "markdown": {"content": content}}
              data = json.dumps(payload, ensure_ascii=False).encode("utf-8")
              req = urllib.request.Request(
                  WECOM_WEBHOOK,
                  data=data,
                  headers={"Content-Type": "application/json; charset=utf-8"},
                  method="POST",
              )
              with urllib.request.urlopen(req, timeout=30) as resp:
                  body = resp.read().decode("utf-8", errors="replace")
              print(body)
              parsed = json.loads(body)
              if parsed.get("errcode") != 0:
                  raise RuntimeError(f"企业微信返回失败：{body}")

          now = datetime.now(BEIJING)
          items = fetch_google_news() + fetch_60s_news()
          news = dedupe_scored(items)[:15]

          lines = ["每日新闻", format_date(now), get_hangzhou_weather(), ""]
          if news:
              for idx, item in enumerate(news, 1):
                  lines.append(f"{idx}、{item}；")
                  lines.append("")
          else:
              lines.append("1、今日新闻暂时获取失败，请稍后查看；")

          content = "\n".join(lines).strip()
          print(content)
          send_wecom(content)
          PY

