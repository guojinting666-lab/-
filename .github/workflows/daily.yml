name: Daily Light Brief

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  send-brief:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate long-run brief and push to WeCom
        env:
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          SILICONFLOW_MODEL: Qwen/Qwen2.5-7B-Instruct
        run: |
          python - <<'PY'
          import email.utils
          import hashlib
          import html
          import json
          import os
          import random
          import re
          import urllib.parse
          import urllib.request
          import xml.etree.ElementTree as ET
          from datetime import date, datetime, timedelta, timezone

          BEIJING = timezone(timedelta(hours=8))
          STATE_FILE = ".brief_state.json"
          WECOM_WEBHOOK = os.environ.get("WECOM_WEBHOOK")
          SILICONFLOW_API_KEY = os.environ.get("SILICONFLOW_API_KEY")
          SILICONFLOW_MODEL = os.environ.get("SILICONFLOW_MODEL") or "Qwen/Qwen2.5-7B-Instruct"
          SILICONFLOW_URL = "https://api.siliconflow.cn/v1/chat/completions"

          WEEKDAYS = ["星期一", "星期二", "星期三", "星期四", "星期五", "星期六", "星期日"]
          CN_MONTHS = ["一月", "二月", "三月", "四月", "五月", "六月", "七月", "八月", "九月", "十月", "十一月", "十二月"]
          CN_DAYS = ["", "一日", "二日", "三日", "四日", "五日", "六日", "七日", "八日", "九日", "十日", "十一日", "十二日", "十三日", "十四日", "十五日", "十六日", "十七日", "十八日", "十九日", "二十日", "二十一日", "二十二日", "二十三日", "二十四日", "二十五日", "二十六日", "二十七日", "二十八日", "二十九日", "三十日", "三十一日"]
          LUNAR_MONTHS = ["", "正月", "二月", "三月", "四月", "五月", "六月", "七月", "八月", "九月", "十月", "冬月", "腊月"]
          LUNAR_DAYS = ["", "初一", "初二", "初三", "初四", "初五", "初六", "初七", "初八", "初九", "初十", "十一", "十二", "十三", "十四", "十五", "十六", "十七", "十八", "十九", "二十", "廿一", "廿二", "廿三", "廿四", "廿五", "廿六", "廿七", "廿八", "廿九", "三十"]
          WEATHER_CODES = {0:"晴",1:"大部晴朗",2:"局部多云",3:"阴",45:"雾",48:"雾凇",51:"小毛毛雨",53:"毛毛雨",55:"较强毛毛雨",61:"小雨",63:"中雨",65:"大雨",71:"小雪",73:"中雪",75:"大雪",80:"阵雨",81:"较强阵雨",82:"强阵雨",95:"雷阵雨"}
          HOLIDAYS_2026 = [("端午节", "2026-06-19"), ("中秋节", "2026-09-25"), ("国庆节", "2026-10-01")]
          FOOTBALL_LEAGUES = [("世界杯", "fifa.world"), ("欧冠", "uefa.champions"), ("英超", "eng.1"), ("西甲", "esp.1"), ("意甲", "ita.1"), ("德甲", "ger.1"), ("法甲", "fra.1"), ("中超", "chn.1")]
          TECH_RSS = [("OpenAI", "https://openai.com/blog/rss.xml"), ("Apple", "https://www.apple.com/newsroom/rss-feed.rss"), ("Google", "https://blog.google/rss/"), ("Microsoft", "https://blogs.microsoft.com/feed/"), ("GitHub", "https://github.blog/feed/")]
          TEAM_ZH = {"Bosnia-Herz":"波黑","Bosnia and Herzegovina":"波黑","Canada":"加拿大","Paraguay":"巴拉圭","USA":"美国","United States":"美国","Switzerland":"瑞士","Qatar":"卡塔尔","England":"英格兰","Spain":"西班牙","France":"法国","Germany":"德国","Italy":"意大利","Brazil":"巴西","Argentina":"阿根廷"}

          # Lunar calendar data, 1900-2050. Base date: 1900-01-31 = lunar 1900-01-01.
          LUNAR_INFO = [
              0x04bd8,0x04ae0,0x0a570,0x054d5,0x0d260,0x0d950,0x16554,0x056a0,0x09ad0,0x055d2,
              0x04ae0,0x0a5b6,0x0a4d0,0x0d250,0x1d255,0x0b540,0x0d6a0,0x0ada2,0x095b0,0x14977,
              0x04970,0x0a4b0,0x0b4b5,0x06a50,0x06d40,0x1ab54,0x02b60,0x09570,0x052f2,0x04970,
              0x06566,0x0d4a0,0x0ea50,0x06e95,0x05ad0,0x02b60,0x186e3,0x092e0,0x1c8d7,0x0c950,
              0x0d4a0,0x1d8a6,0x0b550,0x056a0,0x1a5b4,0x025d0,0x092d0,0x0d2b2,0x0a950,0x0b557,
              0x06ca0,0x0b550,0x15355,0x04da0,0x0a5d0,0x14573,0x052d0,0x0a9a8,0x0e950,0x06aa0,
              0x0aea6,0x0ab50,0x04b60,0x0aae4,0x0a570,0x05260,0x0f263,0x0d950,0x05b57,0x056a0,
              0x096d0,0x04dd5,0x04ad0,0x0a4d0,0x0d4d4,0x0d250,0x0d558,0x0b540,0x0b6a0,0x195a6,
              0x095b0,0x049b0,0x0a974,0x0a4b0,0x0b27a,0x06a50,0x06d40,0x0af46,0x0ab60,0x09570,
              0x04af5,0x04970,0x064b0,0x074a3,0x0ea50,0x06b58,0x05ac0,0x0ab60,0x096d5,0x092e0,
              0x0c960,0x0d954,0x0d4a0,0x0da50,0x07552,0x056a0,0x0abb7,0x025d0,0x092d0,0x0cab5,
              0x0a950,0x0b4a0,0x0baa4,0x0ad50,0x055d9,0x04ba0,0x0a5b0,0x15176,0x052b0,0x0a930,
              0x07954,0x06aa0,0x0ad50,0x05b52,0x04b60,0x0a6e6,0x0a4e0,0x0d260,0x0ea65,0x0d530,
              0x05aa0,0x076a3,0x096d0,0x04bd7,0x04ad0,0x0a4d0,0x1d0b6,0x0d250,0x0d520,0x0dd45,
              0x0b5a0,0x056d0,0x055b2,0x049b0,0x0a577,0x0a4b0,0x0aa50,0x1b255,0x06d20,0x0ada0,
          ]
          SOLAR_TERM_NAMES = ["小寒","大寒","立春","雨水","惊蛰","春分","清明","谷雨","立夏","小满","芒种","夏至","小暑","大暑","立秋","处暑","白露","秋分","寒露","霜降","立冬","小雪","大雪","冬至"]
          SOLAR_TERM_INFO = [0,21208,42467,63836,85337,107014,128867,150921,173149,195551,218072,240693,263343,285989,308563,331033,353350,375494,397447,419210,440795,462224,483532,504758]

          def load_state():
              if not os.path.exists(STATE_FILE):
                  return {"used": {}}
              try:
                  with open(STATE_FILE, "r", encoding="utf-8") as f:
                      return json.load(f)
              except Exception:
                  return {"used": {}}

          def save_state(state):
              for k, v in state.get("used", {}).items():
                  state["used"][k] = v[-500:]
              with open(STATE_FILE, "w", encoding="utf-8") as f:
                  json.dump(state, f, ensure_ascii=False, indent=2)

          STATE = load_state()

          def mark_once(kind, text):
              key = hashlib.sha1(text.encode("utf-8")).hexdigest()
              used = STATE.setdefault("used", {}).setdefault(kind, [])
              if key in used:
                  return False
              used.append(key)
              return True

          def http_get(url, timeout=25):
              req = urllib.request.Request(url, headers={"User-Agent":"DailyLightBrief/1.0","Accept":"application/json,application/xml,text/xml,text/html,*/*","Accept-Language":"zh-CN,zh;q=0.9,en;q=0.5"})
              with urllib.request.urlopen(req, timeout=timeout) as resp:
                  return resp.read().decode("utf-8", errors="replace")

          def post_json(url, payload, timeout=30, headers=None):
              data = json.dumps(payload, ensure_ascii=False).encode("utf-8")
              h = {"Content-Type":"application/json; charset=utf-8"}
              if headers:
                  h.update(headers)
              req = urllib.request.Request(url, data=data, headers=h, method="POST")
              with urllib.request.urlopen(req, timeout=timeout) as resp:
                  return resp.read().decode("utf-8", errors="replace")

          def clean(text):
              text = html.unescape(str(text or ""))
              text = re.sub(r"<[^>]+>", "", text)
              return re.sub(r"\s+", " ", text).strip(" ；;，,。")

          def zh_text(text):
              text = clean(text)
              for en, zh in TEAM_ZH.items():
                  text = text.replace(en, zh)
              return text.replace("Scheduled","待开赛").replace("Final","完场").replace("Halftime","中场").replace("Postponed","延期")

          def date_line(now):
              return f"📆{CN_MONTHS[now.month-1]}{CN_DAYS[now.day]}  {WEEKDAYS[now.weekday()]}"

          def lunar_year_days(year):
              info = LUNAR_INFO[year - 1900]
              total = 348
              for i in range(0x8000, 0x8, -1):
                  if info & i:
                      total += 1
              return total + leap_days(year)

          def leap_month(year):
              return LUNAR_INFO[year - 1900] & 0xf

          def leap_days(year):
              lm = leap_month(year)
              if lm:
                  return 30 if (LUNAR_INFO[year - 1900] & 0x10000) else 29
              return 0

          def month_days(year, month):
              return 30 if (LUNAR_INFO[year - 1900] & (0x10000 >> month)) else 29

          def lunar_date_text(day):
              offset = (day - date(1900, 1, 31)).days
              year = 1900
              while year < 2050 and offset >= lunar_year_days(year):
                  offset -= lunar_year_days(year)
                  year += 1
              lm = leap_month(year)
              is_leap = False
              month = 1
              while month <= 12:
                  md = leap_days(year) if is_leap else month_days(year, month)
                  if offset < md:
                      break
                  offset -= md
                  if lm == month and not is_leap:
                      is_leap = True
                  else:
                      if is_leap:
                          is_leap = False
                      month += 1
              prefix = "闰" if is_leap else ""
              return f"农历{prefix}{LUNAR_MONTHS[month]}{LUNAR_DAYS[offset + 1]}"

          def solar_term_for_day(day):
              year = day.year
              base = datetime(1900, 1, 6, 2, 5, tzinfo=BEIJING)
              for i, name in enumerate(SOLAR_TERM_NAMES):
                  minutes = 525948.76 * (year - 1900) + SOLAR_TERM_INFO[i]
                  term_day = (base + timedelta(minutes=minutes)).date()
                  diff = (term_day - day).days
                  if diff == 0:
                      return f"今天是{name}"
                  if 0 < diff <= 15:
                      return f"距离{name}还有{diff}天"
              return ""

          def uv_note(uv):
              if uv is None: return ""
              uv = float(uv)
              if uv < 3: return "紫外线较弱"
              if uv < 6: return "紫外线中等，长时间户外建议防晒"
              if uv < 8: return "紫外线较强，建议防晒"
              return "紫外线很强，尽量减少暴晒"

          def aqi_note(aqi):
              if aqi is None: return ""
              aqi = float(aqi)
              if aqi <= 50: return "空气好，适合户外"
              if aqi <= 100: return "空气可接受"
              if aqi <= 150: return "轻度污染，敏感人群少久待户外"
              if aqi <= 200: return "中度污染，建议减少户外运动"
              return "污染较重，尽量减少户外活动"

          def pm25_note(pm25):
              if pm25 is None: return ""
              pm25 = float(pm25)
              if pm25 <= 35: return "PM2.5较低"
              if pm25 <= 75: return "PM2.5偏高，敏感人群注意"
              return "PM2.5较高，建议减少户外暴露"

          def weather_air_item(day_offset=0):
              url = "https://api.open-meteo.com/v1/forecast?latitude=30.2741&longitude=120.1551&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max,uv_index_max&current=wind_speed_10m&timezone=Asia%2FShanghai&forecast_days=2"
              try:
                  obj = json.loads(http_get(url, timeout=20))
                  d = obj.get("daily", {})
                  idx = day_offset
                  code = int((d.get("weather_code") or [3,3])[idx])
                  desc = WEATHER_CODES.get(code, "天气待查")
                  high = round(float((d.get("temperature_2m_max") or [0,0])[idx]))
                  low = round(float((d.get("temperature_2m_min") or [0,0])[idx]))
                  pop = (d.get("precipitation_probability_max") or [None,None])[idx]
                  uv = (d.get("uv_index_max") or [None,None])[idx]
                  advice = "建议带伞" if code in [51,53,55,61,63,65,80,81,82,95] or (pop is not None and int(pop) >= 50) else "适合正常出行"
                  if day_offset == 1:
                      return f"明天天气：杭州{desc}，{low}℃～{high}℃，{advice}"
                  air = ""
                  try:
                      aq = json.loads(http_get("https://air-quality-api.open-meteo.com/v1/air-quality?latitude=30.2741&longitude=120.1551&current=pm2_5,us_aqi&timezone=Asia%2FShanghai", timeout=15)).get("current", {})
                      if aq.get("us_aqi") is not None:
                          air += f"，AQI {round(float(aq['us_aqi']))}（{aqi_note(aq.get('us_aqi'))}）"
                      if aq.get("pm2_5") is not None:
                          air += f"，PM2.5 {round(float(aq['pm2_5']), 1)}（{pm25_note(aq.get('pm2_5'))}）"
                  except Exception:
                      pass
                  extra = []
                  if pop is not None: extra.append(f"降水概率{int(pop)}%")
                  if uv is not None: extra.append(f"紫外线{round(float(uv), 1)}（{uv_note(uv)}）")
                  return f"天气空气：今天杭州{desc}，{low}℃～{high}℃，{advice}" + ("，" + "，".join(extra) if extra else "") + air + f"；{weather_air_item(1)}"
              except Exception:
                  return "天气空气：杭州天气暂时获取失败"

          def calendar_item(now):
              today = now.date()
              bits = [lunar_date_text(today)]
              st = solar_term_for_day(today)
              if st: bits.append(st)
              for name, day in HOLIDAYS_2026:
                  d = datetime.strptime(day, "%Y-%m-%d").date()
                  diff = (d - today).days
                  if 0 <= diff <= 30:
                      bits.append(f"距离{name}还有{diff}天")
                      break
              if now.weekday() == 6: bits.append("今天是周日，明天工作日")
              elif now.weekday() == 4: bits.append("今天是周五，周末前最后一个工作日")
              return "日历：" + "；".join(bits)

          def history_item(now):
              try:
                  obj = json.loads(http_get(f"https://zh.wikipedia.org/api/rest_v1/feed/onthisday/events/{now.month}/{now.day}", timeout=20))
                  candidates = []
                  for ev in obj.get("events", []):
                      text = clean(ev.get("text"))
                      year = ev.get("year")
                      if not text or len(text) > 95 or any(x in text for x in ["出生", "逝世"]):
                          continue
                      if isinstance(year, int) and year <= now.year - 50:
                          candidates.append(f"历史：{year}年，{text}")
                  for item in candidates + [f"历史：{clean(ev.get('year'))}年，{clean(ev.get('text'))}" for ev in obj.get("events", []) if clean(ev.get("text"))]:
                      if mark_once("history", item):
                          return item
              except Exception:
                  pass
              return "历史：今天没有抓到合适的远年事件"

          def parse_pubdate(text):
              try:
                  dt = email.utils.parsedate_to_datetime(text)
                  if dt.tzinfo is None: dt = dt.replace(tzinfo=timezone.utc)
                  return dt.astimezone(BEIJING)
              except Exception:
                  return None

          def tech_item(now):
              keywords = ["release","launch","announce","security","model","update","发布","推出","上线","安全","模型","更新"]
              for name, url in TECH_RSS:
                  try:
                      root = ET.fromstring(http_get(url, timeout=18))
                      for item in root.findall(".//item")[:8]:
                          title = clean(item.findtext("title"))
                          pub = parse_pubdate(item.findtext("pubDate"))
                          if pub and now - pub > timedelta(days=14): continue
                          if title and len(title) <= 110 and any(k.lower() in title.lower() for k in keywords):
                              return f"科技：{name} 官方更新，{title}"
                  except Exception:
                      continue
              return "科技：今天没有抓到值得单独提醒的官方大更新"

          def football_items(now, limit=2):
              items, seen = [], set()
              for label, league in FOOTBALL_LEAGUES:
                  for delta in [-1,0,1]:
                      day = (now + timedelta(days=delta)).strftime("%Y%m%d")
                      url = f"https://site.api.espn.com/apis/site/v2/sports/soccer/{league}/scoreboard?dates={day}"
                      try:
                          obj = json.loads(http_get(url, timeout=15))
                          for event in obj.get("events", [])[:5]:
                              comp = (event.get("competitions") or [{}])[0]
                              teams = comp.get("competitors", [])
                              if len(teams) < 2: continue
                              home = next((x for x in teams if x.get("homeAway") == "home"), teams[0])
                              away = next((x for x in teams if x.get("homeAway") == "away"), teams[1])
                              hn = zh_text(home.get("team", {}).get("shortDisplayName") or home.get("team", {}).get("displayName"))
                              an = zh_text(away.get("team", {}).get("shortDisplayName") or away.get("team", {}).get("displayName"))
                              hs, ass = home.get("score"), away.get("score")
                              st = comp.get("status", {}).get("type", {})
                              state = st.get("state")
                              detail = zh_text(st.get("shortDetail") or comp.get("status", {}).get("displayClock") or "")
                              key = f"{label}{an}{hn}{day}"
                              if key in seen: continue
                              seen.add(key)
                              if state == "post" and hs is not None and ass is not None: items.append(f"{label} {an} {ass}-{hs} {hn}")
                              elif state == "pre": items.append(f"{label} {an} vs {hn}，{detail}")
                              else: items.append(f"{label} {an} {ass or ''}-{hs or ''} {hn}，{detail}")
                              if len(items) >= limit: return items
                      except Exception:
                          continue
              return items or ["今天暂未抓到重点比赛赛程或比分"]

          def steam_item():
              try:
                  obj = json.loads(http_get("https://store.steampowered.com/api/featuredcategories?cc=cn&l=schinese", timeout=18))
                  names = [clean(x.get("name")) for x in obj.get("top_sellers", {}).get("items", []) if clean(x.get("name"))][:3]
                  if names: return f"游戏：Steam 热销榜前列包括《{'》《'.join(names)}》"
              except Exception:
                  pass
              return "游戏：Steam 热销榜暂时获取失败"

          def online_movie_item():
              try:
                  obj = json.loads(http_get("https://rss.applemarketingtools.com/api/v2/us/movies/top-movies/all/25/explicit.json", timeout=18))
                  for x in obj.get("feed", {}).get("results", []):
                      name = clean(x.get("name"))
                      genre = clean((x.get("genres") or [{}])[0].get("name"))
                      if name and mark_once("movie", name):
                          return f"电影：Apple 电影榜推荐《{name}》，类型：{genre or '电影'}"
              except Exception:
                  pass
              return "电影：今日电影榜暂时获取失败"

          def online_book_item():
              try:
                  obj = json.loads(http_get("https://openlibrary.org/trending/daily.json", timeout=18))
                  for x in obj.get("works", [])[:30]:
                      title = clean(x.get("title"))
                      authors = ", ".join(clean(a.get("name")) for a in x.get("author_name", [])[:2]) if isinstance(x.get("author_name"), list) else ""
                      if title and mark_once("book", title):
                          return f"好书：Open Library 趋势书《{title}》" + (f"，作者 {authors}" if authors else "")
              except Exception:
                  pass
              return "好书：今日趋势书暂时获取失败"

          def quote_item():
              try:
                  obj = json.loads(http_get("https://api.quotable.io/random?maxLength=80", timeout=15))
                  quote = clean(obj.get("content"))
                  author = clean(obj.get("author"))
                  item = f"摘抄：{quote}——{author}"
                  if quote and mark_once("quote", item): return item
              except Exception:
                  pass
              return "摘抄：今天没有抓到合适的短句"

          def science_item():
              try:
                  obj = json.loads(http_get("https://zh.wikipedia.org/api/rest_v1/page/random/summary", timeout=15))
                  title = clean(obj.get("title"))
                  extract = clean(obj.get("extract"))
                  if title and extract and len(extract) > 30:
                      text = extract[:90].rstrip("，。；;") + "。"
                      if mark_once("science", title):
                          return f"科普：{title}——{text}"
              except Exception:
                  pass
              return "科普：今天的随机百科暂时获取失败"

          def yesterday_hot_item():
              urls = ["https://api-hot.imsyy.top/baidu","https://api-hot.imsyy.top/toutiao","https://api-hot.imsyy.top/weibo","https://api-hot.imsyy.top/zhihu"]
              bad = ["股票","股价","财报","广告","直播","彩票","星座","美女","网红","八卦","开播","抽奖","第几","多少","为何","一文读懂"]
              def walk(obj):
                  if isinstance(obj, dict):
                      for key in ["title","name","word","desc","hot_word","keyword"]:
                          if isinstance(obj.get(key), str): yield obj[key]
                      for v in obj.values(): yield from walk(v)
                  elif isinstance(obj, list):
                      for v in obj: yield from walk(v)
              for url in urls:
                  try:
                      obj = json.loads(http_get(url, timeout=15))
                      for raw in walk(obj):
                          title = clean(raw)
                          if 8 <= len(title) <= 60 and not any(x in title for x in bad) and mark_once("hot", title):
                              return f"昨日热点：{title}"
                  except Exception:
                      continue
              return None

          def info_gap_item(now):
              prompt = f"请写一条适合年轻人的“今日信息差”，必须具体、实用、非鸡汤，30字以内。今天日期：{now.strftime('%Y-%m-%d')}。只输出一句中文。"
              if SILICONFLOW_API_KEY:
                  try:
                      raw = post_json(SILICONFLOW_URL, {"model":SILICONFLOW_MODEL,"messages":[{"role":"user","content":prompt}],"temperature":0.4,"max_tokens":100}, timeout=60, headers={"Authorization":f"Bearer {SILICONFLOW_API_KEY}"})
                      text = clean(json.loads(raw)["choices"][0]["message"]["content"])
                      if text and mark_once("info_gap", text):
                          return "今日信息差：" + text
                  except Exception:
                      pass
              return "今日信息差：重要 App 的自动续费最好开通后立刻设置取消提醒"

          def english_item(now):
              if SILICONFLOW_API_KEY:
                  try:
                      prompt = f"给一个今天可用的实用英语短句，格式：英语 / 中文。不要名言，不要鸡汤。日期：{now.strftime('%Y-%m-%d')}。"
                      raw = post_json(SILICONFLOW_URL, {"model":SILICONFLOW_MODEL,"messages":[{"role":"user","content":prompt}],"temperature":0.3,"max_tokens":100}, timeout=60, headers={"Authorization":f"Bearer {SILICONFLOW_API_KEY}"})
                      text = clean(json.loads(raw)["choices"][0]["message"]["content"])
                      if text and mark_once("english", text):
                          return "英语：" + text
                  except Exception:
                      pass
              return "英语：Could you give me a quick update? / 你能快速同步一下进展吗？"

          def life_item(now):
              if SILICONFLOW_API_KEY:
                  try:
                      prompt = f"写一条城市生活小建议，具体实用，不要鸡汤，35字以内。日期：{now.strftime('%Y-%m-%d')}。"
                      raw = post_json(SILICONFLOW_URL, {"model":SILICONFLOW_MODEL,"messages":[{"role":"user","content":prompt}],"temperature":0.4,"max_tokens":100}, timeout=60, headers={"Authorization":f"Bearer {SILICONFLOW_API_KEY}"})
                      text = clean(json.loads(raw)["choices"][0]["message"]["content"])
                      if text and mark_once("life", text):
                          return "生活：" + text
                  except Exception:
                      pass
              return "生活：雨天通勤包里放一双薄袜子，比临时找纸巾更实用"

          def translate_items(items):
              if not SILICONFLOW_API_KEY: return items
              payload = {"model":SILICONFLOW_MODEL,"messages":[{"role":"system","content":"你是中文晨报编辑。只输出JSON数组。把英文翻译成自然中文；保留比分、书名、片名、游戏名和事实；不要添加新事实。"},{"role":"user","content":json.dumps(items, ensure_ascii=False)}],"temperature":0.1,"max_tokens":1800}
              try:
                  raw = post_json(SILICONFLOW_URL, payload, timeout=90, headers={"Authorization":f"Bearer {SILICONFLOW_API_KEY}"})
                  text = json.loads(raw)["choices"][0]["message"]["content"].strip()
                  m = re.search(r"\[[\s\S]*\]", text)
                  data = json.loads(m.group(0) if m else text)
                  if isinstance(data, list) and len(data) == len(items): return [clean(x) for x in data]
              except Exception as e:
                  print("中文化失败：", str(e)[:300])
              return items

          def build_content():
              now = datetime.now(BEIJING)
              football = football_items(now, 2)
              items = [
                  weather_air_item(0),
                  calendar_item(now),
                  history_item(now),
                  "足球：" + "；".join(football),
                  steam_item(),
                  tech_item(now),
              ]
              hot = yesterday_hot_item()
              if hot: items.append(hot)
              items.extend([
                  info_gap_item(now),
                  online_movie_item(),
                  online_book_item(),
                  quote_item(),
                  science_item(),
                  english_item(now),
                  life_item(now),
                  "明日看点：" + weather_air_item(1),
              ])
              items = translate_items(items)
              lines = ["每日轻量晨报", date_line(now)]
              for i, item in enumerate(items[:15], 1):
                  lines.append(f"{i}、{item}；")
              return "\n".join(lines)

          def send_wecom(content):
              if not WECOM_WEBHOOK: raise RuntimeError("缺少 GitHub Secret：WECOM_WEBHOOK")
              raw = post_json(WECOM_WEBHOOK, {"msgtype":"markdown","markdown":{"content":content}})
              print(raw)
              if json.loads(raw).get("errcode") != 0: raise RuntimeError("企业微信返回失败：" + raw)

          print("脚本版本：light-brief-v7-longrun")
          content = build_content()
          print(content)
          send_wecom(content)
          save_state(STATE)
          PY

      - name: Save dedupe state
        run: |
          if [ -f .brief_state.json ] && [ -n "$(git status --porcelain .brief_state.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .brief_state.json
            git commit -m "Update daily brief state"
            git push
          fi
