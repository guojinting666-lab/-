name: 每日新闻推送

on:
  workflow_dispatch:
  schedule:
    # GitHub 使用 UTC 时间；00:00 UTC = 北京时间 08:00
    - cron: "0 0 * * *"

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - name: 生成每日新闻并推送企业微信
        env:
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
        run: |
          python - <<'PY'
          import email.utils
          import html
          import json
          import os
          import re
          import urllib.parse
          import urllib.request
          import xml.etree.ElementTree as ET
          from datetime import datetime, timedelta, timezone

          BEIJING = timezone(timedelta(hours=8))
          WECOM_WEBHOOK = os.environ.get("WECOM_WEBHOOK")
          RECENT_DAYS = 7

          WEATHER_CODES = {0:"晴",1:"大部晴朗",2:"局部多云",3:"阴",45:"雾",51:"小毛毛雨",53:"毛毛雨",55:"较强毛毛雨",61:"小雨",63:"中雨",65:"大雨",71:"小雪",73:"中雪",75:"大雪",80:"阵雨",81:"较强阵雨",82:"强阵雨",95:"雷阵雨"}
          WEEKDAYS = ["星期一","星期二","星期三","星期四","星期五","星期六","星期日"]
          CN_MONTHS = ["一月","二月","三月","四月","五月","六月","七月","八月","九月","十月","十一月","十二月"]
          CN_DAYS = ["","一日","二日","三日","四日","五日","六日","七日","八日","九日","十日","十一日","十二日","十三日","十四日","十五日","十六日","十七日","十八日","十九日","二十日","二十一日","二十二日","二十三日","二十四日","二十五日","二十六日","二十七日","二十八日","二十九日","三十日","三十一日"]

          CATEGORIES = [
              ("国内", 3, ["中国 国内 社会 民生 教育 医疗 交通 新规 警方 法院 最新", "中国 消费 出行 天气 高考 医保 养老 就业 最新"]),
              ("国际", 3, ["国际新闻 美国 欧洲 日本 韩国 中东 俄乌 全球 最新", "美国 日本 韩国 欧洲 中东 俄乌 政府 宣布 最新"]),
              ("财经商业", 3, ["财经 商业 公司 股市 汽车 新能源 消费 市场 最新", "A股 港股 人民币 美元 房地产 汽车 公司 财报 最新"]),
              ("科技数码", 3, ["科技 手机 芯片 机器人 互联网 游戏 AI 最新", "华为 苹果 小米 英伟达 OpenAI 大模型 新品 发布 最新"]),
              ("文娱生活", 3, ["电影 音乐 文娱 票房 演唱会 旅游 年轻人 消费 最新", "游戏 社交平台 B站 抖音 电影 综艺 音乐 最新"]),
          ]

          HOT_ENDPOINTS = {
              "国内": ["https://api-hot.imsyy.top/baidu", "https://api-hot.imsyy.top/toutiao", "https://api-hot.imsyy.top/weibo", "https://api-hot.imsyy.top/zhihu"],
              "国际": ["https://api-hot.imsyy.top/zhihu", "https://api-hot.imsyy.top/thepaper"],
              "财经商业": ["https://api-hot.imsyy.top/36kr", "https://api-hot.imsyy.top/ithome"],
              "科技数码": ["https://api-hot.imsyy.top/ithome", "https://api-hot.imsyy.top/36kr"],
              "文娱生活": ["https://api-hot.imsyy.top/bilibili", "https://api-hot.imsyy.top/douyin", "https://api-hot.imsyy.top/weibo"],
          }

          BAD_WORDS = [
              "学习贯彻","重要讲话","会议指出","会议强调","高质量发展","现代化建设","工作会议","座谈会","主题教育","党建","党纪",
              "每日一言","历史上的今天","今日油价","彩票","星座","养生","鸡汤","一图读懂","一文读懂","背后原因","原因找到了",
              "网友炸锅","冲上热搜","引热议","什么情况","怎么回事","为何","为什么","你怎么看","速看","注意了","分析人士",
              "深度研报","研报：","透视","年终报道","市场介绍","操盘必读","财经媒体报道汇总","影响股市利好或利空",
              "盘点","观察","评论：","社论：","专访：","战略报告","统计公报","一场意志","制度的较量","可持续增长答卷",
              "足球","世界杯","欧冠","英超","西甲","中超","国足","转会","梅西","C罗","曼联","皇马",
          ]

          ACTION_WORDS = ["宣布","发布","确认","通过","批准","实施","生效","启动","恢复","取消","禁止","允许","推出","上线","下架","召回","调查","逮捕","起诉","判决","处罚","罚款","死亡","受伤","救援","关闭","开放","上涨","下跌","增长","下降","突破","创下","超过","降至","涨至","签约","裁员","收购","出售","上市","停产","量产","交付","发射","坠毁","开售","开通","停运","延误","回应","辟谣","被曝","将赴","会谈","发放","免征","上调","下调","新增","减少","申请","获批"]

          def http_get(url, timeout=20):
              req = urllib.request.Request(url, headers={"User-Agent":"Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/125 Safari/537.36","Accept":"application/json,application/xml,text/xml,text/html,*/*","Accept-Language":"zh-CN,zh;q=0.9"})
              with urllib.request.urlopen(req, timeout=timeout) as resp:
                  return resp.read().decode("utf-8", errors="replace")

          def clean_text(text):
              text = html.unescape(str(text or ""))
              text = re.sub(r"<[^>]+>", "", text)
              text = re.sub(r"^\s*\d+[、.．]\s*", "", text)
              text = re.sub(r"\s+-\s+[^-]+$", "", text)
              text = re.sub(r"_\d{4}年\d{1,2}月\d{1,2}日_.*$", "", text)
              text = re.sub(r"\s+", " ", text).strip()
              return text.strip("；;，,。 ")

          def has_chinese(text):
              return re.search(r"[\u4e00-\u9fff]", text or "") is not None

          def reject_old_years(text, current_year):
              years = [int(y) for y in re.findall(r"20\d{2}", text)]
              return any(y < current_year for y in years)

          def base_ok(text, current_year):
              if not text or len(text) < 10 or len(text) > 120 or not has_chinese(text):
                  return False
              if reject_old_years(text, current_year):
                  return False
              if any(x in text for x in BAD_WORDS):
                  return False
              if re.fullmatch(r"[\d\s:：/-]+", text):
                  return False
              return True

          def strong_ok(text, current_year):
              if not base_ok(text, current_year):
                  return False
              if re.search(r"^[\u4e00-\u9fffA-Za-z]{1,8}[:：].*(宣布|确认|将|已|因|对|向|在|为|以|获|被|成|称)", text):
                  return True
              if any(x in text for x in ACTION_WORDS):
                  return True
              if re.search(r"\d", text) and ("：" in text or ":" in text):
                  return True
              return False

          def weak_ok(text, current_year):
              if not base_ok(text, current_year):
                  return False
              if "：" in text or ":" in text:
                  return True
              if re.search(r"\d", text):
                  return True
              if any(x in text for x in ACTION_WORDS):
                  return True
              # 最后一层兜底：标题较完整，不是悬念句，也可以进。
              return len(text) >= 18

          def rss_url(query):
              params = {"q": query + f" when:{RECENT_DAYS}d", "hl":"zh-CN", "gl":"CN", "ceid":"CN:zh-Hans"}
              return "https://news.google.com/rss/search?" + urllib.parse.urlencode(params)

          def parse_pubdate(text):
              try:
                  dt = email.utils.parsedate_to_datetime(text)
                  if dt.tzinfo is None:
                      dt = dt.replace(tzinfo=timezone.utc)
                  return dt.astimezone(BEIJING)
              except Exception:
                  return None

          def fetch_rss_category(category, queries, now):
              strong, weak = [], []
              for query in queries:
                  try:
                      raw = http_get(rss_url(query))
                      root = ET.fromstring(raw)
                      for item in root.findall(".//item")[:100]:
                          title = clean_text(item.findtext("title"))
                          pub = parse_pubdate(item.findtext("pubDate"))
                          if pub and not (now - timedelta(days=RECENT_DAYS, hours=12) <= pub <= now + timedelta(minutes=10)):
                              continue
                          if strong_ok(title, now.year):
                              strong.append(title)
                          elif weak_ok(title, now.year):
                              weak.append(title)
                  except Exception:
                      continue
              return strong, weak

          def extract_titles(value):
              titles = []
              def walk(obj):
                  if isinstance(obj, dict):
                      for key in ["title","name","word","desc","hot_word","keyword"]:
                          if key in obj and isinstance(obj[key], str):
                              titles.append(obj[key])
                      for v in obj.values():
                          walk(v)
                  elif isinstance(obj, list):
                      for v in obj:
                          walk(v)
              walk(value)
              return titles

          def fetch_hot_category(category, now):
              strong, weak = [], []
              for url in HOT_ENDPOINTS.get(category, []):
                  try:
                      obj = json.loads(http_get(url))
                      for title in extract_titles(obj):
                          title = clean_text(title)
                          if strong_ok(title, now.year):
                              strong.append(title)
                          elif weak_ok(title, now.year):
                              weak.append(title)
                  except Exception:
                      continue
              return strong, weak

          def dedupe_titles(titles):
              out = []
              seen = set()
              for title in titles:
                  key = re.sub(r"\W+", "", title.lower())[:80]
                  if key and key not in seen:
                      seen.add(key)
                      out.append(title)
              return out

          def get_news(now):
              pools = {}
              for category, quota, queries in CATEGORIES:
                  s1, w1 = fetch_rss_category(category, queries, now)
                  s2, w2 = fetch_hot_category(category, now)
                  pools[category] = {
                      "strong": dedupe_titles(s1 + s2),
                      "weak": dedupe_titles(w1 + w2),
                  }
              picked = []
              used = set()
              for category, quota, _ in CATEGORIES:
                  merged = pools[category]["strong"] + pools[category]["weak"]
                  for title in merged[:quota]:
                      if title not in used:
                          picked.append(title)
                          used.add(title)
              i = 0
              while len(picked) < 15 and i < 50:
                  added = False
                  for category, quota, _ in CATEGORIES:
                      merged = pools[category]["strong"] + pools[category]["weak"]
                      if i < len(merged) and merged[i] not in used:
                          picked.append(merged[i])
                          used.add(merged[i])
                          added = True
                          if len(picked) >= 15:
                              break
                  if not added:
                      break
                  i += 1
              return picked[:15]

          def get_hangzhou_weather():
              url = "https://api.open-meteo.com/v1/forecast?latitude=30.2741&longitude=120.1551&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&current=wind_speed_10m&timezone=Asia%2FShanghai&forecast_days=1"
              try:
                  obj=json.loads(http_get(url)); daily=obj.get("daily",{}); current=obj.get("current",{})
                  code=int((daily.get("weather_code") or [3])[0]); desc=WEATHER_CODES.get(code,"天气待查")
                  tmax=round(float((daily.get("temperature_2m_max") or [0])[0])); tmin=round(float((daily.get("temperature_2m_min") or [0])[0]))
                  pop=daily.get("precipitation_probability_max") or [None]; wind=current.get("wind_speed_10m")
                  extra=[]
                  if pop[0] is not None: extra.append(f"降水概率{int(pop[0])}%")
                  if wind is not None: extra.append(f"风速{round(float(wind))}km/h")
                  return f"杭州天气：{desc}，{tmin}℃～{tmax}℃" + ("，" + "，".join(extra) if extra else "")
              except Exception:
                  return "杭州天气：暂时获取失败"

          def format_date(now):
              return f"📆{CN_MONTHS[now.month-1]}{CN_DAYS[now.day]}  {WEEKDAYS[now.weekday()]}"

          def send_wecom(content):
              if not WECOM_WEBHOOK:
                  raise RuntimeError("缺少 GitHub Secret：WECOM_WEBHOOK")
              data=json.dumps({"msgtype":"markdown","markdown":{"content":content}}, ensure_ascii=False).encode("utf-8")
              req=urllib.request.Request(WECOM_WEBHOOK, data=data, headers={"Content-Type":"application/json; charset=utf-8"}, method="POST")
              with urllib.request.urlopen(req, timeout=30) as resp:
                  body=resp.read().decode("utf-8", errors="replace")
              print(body)
              if json.loads(body).get("errcode") != 0:
                  raise RuntimeError(f"企业微信返回失败：{body}")

          now = datetime.now(BEIJING)
          news = get_news(now)
          lines = ["每日新闻", format_date(now), get_hangzhou_weather(), ""]
          if news:
              for idx, item in enumerate(news, 1):
                  lines.append(f"{idx}、{item}；")
                  lines.append("")
          else:
              lines.append("1、今日新闻暂时获取失败，请稍后查看；")
          content = "\n".join(lines).strip()
          print(content)
          send_wecom(content)
          PY

