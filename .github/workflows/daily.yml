name: Daily Light Brief

on:
  workflow_dispatch:
  schedule:
    # 00:00 UTC = 08:00 Beijing time
    - cron: "0 0 * * *"

jobs:
  send-brief:
    runs-on: ubuntu-latest
    steps:
      - name: Generate light brief and push to WeCom
        env:
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          SILICONFLOW_MODEL: Qwen/Qwen2.5-7B-Instruct
        run: |
          python - <<'PY'
          import email.utils
          import html
          import json
          import os
          import re
          import urllib.parse
          import urllib.request
          import xml.etree.ElementTree as ET
          from datetime import datetime, timedelta, timezone

          BEIJING = timezone(timedelta(hours=8))
          WECOM_WEBHOOK = os.environ.get("WECOM_WEBHOOK")
          SILICONFLOW_API_KEY = os.environ.get("SILICONFLOW_API_KEY")
          SILICONFLOW_MODEL = os.environ.get("SILICONFLOW_MODEL") or "Qwen/Qwen2.5-7B-Instruct"
          SILICONFLOW_URL = "https://api.siliconflow.cn/v1/chat/completions"

          WEEKDAYS = ["星期一", "星期二", "星期三", "星期四", "星期五", "星期六", "星期日"]
          CN_MONTHS = ["一月", "二月", "三月", "四月", "五月", "六月", "七月", "八月", "九月", "十月", "十一月", "十二月"]
          CN_DAYS = ["", "一日", "二日", "三日", "四日", "五日", "六日", "七日", "八日", "九日", "十日", "十一日", "十二日", "十三日", "十四日", "十五日", "十六日", "十七日", "十八日", "十九日", "二十日", "二十一日", "二十二日", "二十三日", "二十四日", "二十五日", "二十六日", "二十七日", "二十八日", "二十九日", "三十日", "三十一日"]
          WEATHER_CODES = {0:"晴",1:"大部晴朗",2:"局部多云",3:"阴",45:"雾",48:"雾凇",51:"小毛毛雨",53:"毛毛雨",55:"较强毛毛雨",61:"小雨",63:"中雨",65:"大雨",71:"小雪",73:"中雪",75:"大雪",80:"阵雨",81:"较强阵雨",82:"强阵雨",95:"雷阵雨"}

          HOLIDAYS_2026 = [
              ("端午节", "2026-06-19"),
              ("中秋节", "2026-09-25"),
              ("国庆节", "2026-10-01"),
          ]

          FOOTBALL_LEAGUES = [
              ("世界杯", "fifa.world"),
              ("欧冠", "uefa.champions"),
              ("英超", "eng.1"),
              ("西甲", "esp.1"),
              ("意甲", "ita.1"),
              ("德甲", "ger.1"),
              ("法甲", "fra.1"),
              ("中超", "chn.1"),
          ]

          TECH_RSS = [
              ("OpenAI", "https://openai.com/blog/rss.xml"),
              ("Apple", "https://www.apple.com/newsroom/rss-feed.rss"),
              ("Google", "https://blog.google/rss/"),
              ("Microsoft", "https://blogs.microsoft.com/feed/"),
              ("GitHub", "https://github.blog/feed/"),
          ]

          TEAM_ZH = {
              "Bosnia-Herz": "波黑",
              "Bosnia and Herzegovina": "波黑",
              "Canada": "加拿大",
              "Paraguay": "巴拉圭",
              "USA": "美国",
              "United States": "美国",
              "Switzerland": "瑞士",
              "Qatar": "卡塔尔",
              "England": "英格兰",
              "Spain": "西班牙",
              "France": "法国",
              "Germany": "德国",
              "Italy": "意大利",
              "Brazil": "巴西",
              "Argentina": "阿根廷",
          }

          def http_get(url, timeout=25):
              req = urllib.request.Request(url, headers={
                  "User-Agent": "Mozilla/5.0 Chrome/125 Safari/537.36",
                  "Accept": "application/json,application/xml,text/xml,text/html,*/*",
                  "Accept-Language": "zh-CN,zh;q=0.9,en;q=0.5",
              })
              with urllib.request.urlopen(req, timeout=timeout) as resp:
                  return resp.read().decode("utf-8", errors="replace")

          def post_json(url, payload, timeout=30, headers=None):
              data = json.dumps(payload, ensure_ascii=False).encode("utf-8")
              final_headers = {"Content-Type": "application/json; charset=utf-8"}
              if headers:
                  final_headers.update(headers)
              req = urllib.request.Request(
                  url,
                  data=data,
                  headers=final_headers,
                  method="POST",
              )
              with urllib.request.urlopen(req, timeout=timeout) as resp:
                  return resp.read().decode("utf-8", errors="replace")

          def siliconflow_translate(lines):
              if not SILICONFLOW_API_KEY or not lines:
                  return lines
              payload = {
                  "model": SILICONFLOW_MODEL,
                  "messages": [
                      {"role": "system", "content": "你是中文晨报编辑。只输出 JSON 数组，逐条把输入改写成自然中文，保留事实、比分、产品名，不要添加新事实。"},
                      {"role": "user", "content": json.dumps(lines, ensure_ascii=False)},
                  ],
                  "temperature": 0.1,
                  "max_tokens": 1200,
              }
              try:
                  raw = post_json(
                      SILICONFLOW_URL,
                      payload,
                      timeout=90,
                      headers={"Authorization": f"Bearer {SILICONFLOW_API_KEY}"},
                  )
                  obj = json.loads(raw)
                  text = obj["choices"][0]["message"]["content"].strip()
                  m = re.search(r"\[[\s\S]*\]", text)
                  data = json.loads(m.group(0) if m else text)
                  if isinstance(data, list) and len(data) == len(lines):
                      return [clean(x) for x in data]
              except Exception as e:
                  print("中文化失败：", str(e)[:300])
              return lines

          def clean(text):
              text = html.unescape(str(text or ""))
              text = re.sub(r"<[^>]+>", "", text)
              text = re.sub(r"\s+", " ", text).strip()
              return text.strip(" ；;，,。")

          def zh_text(text):
              text = clean(text)
              for en, zh in TEAM_ZH.items():
                  text = text.replace(en, zh)
              text = text.replace("Scheduled", "待开赛")
              text = text.replace("Final", "完场")
              text = text.replace("Halftime", "中场")
              text = text.replace("Postponed", "延期")
              text = text.replace("vs", "vs")
              return text

          def date_line(now):
              return f"📆{CN_MONTHS[now.month-1]}{CN_DAYS[now.day]}  {WEEKDAYS[now.weekday()]}"

          def weather_line():
              url = "https://api.open-meteo.com/v1/forecast?latitude=30.2741&longitude=120.1551&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&current=wind_speed_10m&timezone=Asia%2FShanghai&forecast_days=1"
              try:
                  obj = json.loads(http_get(url, timeout=20))
                  d = obj.get("daily", {})
                  c = obj.get("current", {})
                  code = int((d.get("weather_code") or [3])[0])
                  desc = WEATHER_CODES.get(code, "天气待查")
                  high = round(float((d.get("temperature_2m_max") or [0])[0]))
                  low = round(float((d.get("temperature_2m_min") or [0])[0]))
                  pop = (d.get("precipitation_probability_max") or [None])[0]
                  wind = c.get("wind_speed_10m")
                  extras = []
                  if pop is not None:
                      extras.append(f"降水概率{int(pop)}%")
                  if wind is not None:
                      extras.append(f"风速{round(float(wind))}km/h")
                  advice = "建议带伞" if code in [51,53,55,61,63,65,80,81,82,95] or (pop is not None and int(pop) >= 50) else "适合正常出行"
                  return f"杭州天气：{desc}，{low}℃～{high}℃，{advice}" + ("，" + "，".join(extras) if extras else "")
              except Exception:
                  return "杭州天气：暂时获取失败"

          def calendar_items(now):
              items = []
              today = now.date()
              for name, day in HOLIDAYS_2026:
                  d = datetime.strptime(day, "%Y-%m-%d").date()
                  diff = (d - today).days
                  if 0 <= diff <= 30:
                      items.append(f"日历：距离{name}还有{diff}天")
                      break
              if now.weekday() == 6:
                  items.append("日历：今天是周日，明天工作日")
              elif now.weekday() == 4:
                  items.append("日历：今天是周五，周末前最后一个工作日")
              return items

          def football_items(now):
              items = []
              seen = set()
              for label, league in FOOTBALL_LEAGUES:
                  for delta in [-1, 0, 1]:
                      day = (now + timedelta(days=delta)).strftime("%Y%m%d")
                      url = f"https://site.api.espn.com/apis/site/v2/sports/soccer/{league}/scoreboard?dates={day}"
                      try:
                          obj = json.loads(http_get(url, timeout=15))
                          for event in obj.get("events", [])[:5]:
                              comps = event.get("competitions", [])
                              if not comps:
                                  continue
                              comp = comps[0]
                              teams = comp.get("competitors", [])
                              if len(teams) < 2:
                                  continue
                              home = next((x for x in teams if x.get("homeAway") == "home"), teams[0])
                              away = next((x for x in teams if x.get("homeAway") == "away"), teams[1])
                              hn = zh_text(home.get("team", {}).get("shortDisplayName") or home.get("team", {}).get("displayName"))
                              an = zh_text(away.get("team", {}).get("shortDisplayName") or away.get("team", {}).get("displayName"))
                              hs = home.get("score")
                              ass = away.get("score")
                              status = comp.get("status", {}).get("type", {})
                              state = status.get("state")
                              detail = zh_text(comp.get("status", {}).get("type", {}).get("shortDetail") or comp.get("status", {}).get("displayClock") or "")
                              key = f"{label}{an}{hn}{day}"
                              if key in seen:
                                  continue
                              seen.add(key)
                              if state == "post" and hs is not None and ass is not None:
                                  text = f"足球：{label} {an} {ass}-{hs} {hn}"
                              elif state == "pre":
                                  text = f"足球：{label} {an} vs {hn}，{detail}"
                              else:
                                  text = f"足球：{label} {an} {ass or ''}-{hs or ''} {hn}，{detail}"
                              items.append(text)
                              if len(items) >= 3:
                                  return items
                      except Exception:
                          continue
              return items

          def local_life_items(now):
              queries = [
                  "杭州 本地 交通 出行 提醒 最新",
                  "杭州 展览 演出 音乐节 活动 最新",
                  "杭州 文旅 消费 地铁 公交 最新",
              ]
              bad = ["房价", "楼市", "招聘", "广告", "论坛", "研讨会", "股票", "银行", "发布会", "主题党日"]
              items = []
              seen = set()
              for query in queries:
                  urls = [
                      "https://news.google.com/rss/search?" + urllib.parse.urlencode({"q": query + " when:3d", "hl":"zh-CN", "gl":"CN", "ceid":"CN:zh-Hans"}),
                      "https://www.bing.com/news/search?" + urllib.parse.urlencode({"q": query, "format":"rss", "setlang":"zh-CN", "cc":"cn"}),
                  ]
                  for url in urls:
                      try:
                          root = ET.fromstring(http_get(url, timeout=18))
                          for item in root.findall(".//item")[:8]:
                              title = clean(item.findtext("title"))
                              pub = parse_pubdate(item.findtext("pubDate"))
                              if pub and now - pub > timedelta(days=3):
                                  continue
                              if not title or any(x in title for x in bad):
                                  continue
                              title = re.sub(r"\s+-\s+[^-]+$", "", title)
                              key = re.sub(r"\W+", "", title.lower())[:60]
                              if key in seen:
                                  continue
                              seen.add(key)
                              items.append(f"杭州：{title}")
                              if len(items) >= 2:
                                  return items
                      except Exception:
                          continue
              return items

          def parse_pubdate(text):
              try:
                  dt = email.utils.parsedate_to_datetime(text)
                  if dt.tzinfo is None:
                      dt = dt.replace(tzinfo=timezone.utc)
                  return dt.astimezone(BEIJING)
              except Exception:
                  return None

          def tech_items(now):
              items = []
              for name, url in TECH_RSS:
                  try:
                      root = ET.fromstring(http_get(url, timeout=18))
                      for item in root.findall(".//item")[:5]:
                          title = clean(item.findtext("title"))
                          pub = parse_pubdate(item.findtext("pubDate"))
                          if pub and now - pub > timedelta(days=7):
                              continue
                          if not title or len(title) > 100:
                              continue
                          items.append(f"科技：{name} 官方更新：{title}")
                          break
                  except Exception:
                      continue
                  if len(items) >= 2:
                      break
              return items

          def epic_items(now):
              url = "https://store-site-backend-static.ak.epicgames.com/freeGamesPromotions?locale=zh-CN&country=CN&allowCountries=CN"
              try:
                  obj = json.loads(http_get(url, timeout=18))
                  games = []
                  for el in obj.get("data", {}).get("Catalog", {}).get("searchStore", {}).get("elements", []):
                      title = clean(el.get("title"))
                      promotions = el.get("promotions") or {}
                      offers = promotions.get("promotionalOffers") or []
                      upcoming = promotions.get("upcomingPromotionalOffers") or []
                      if offers and title:
                          games.append(title)
                      if len(games) >= 2:
                          break
                  if games:
                      return [f"游戏：Epic 本周免费游戏包括《{'》《'.join(games[:2])}》"]
              except Exception:
                  pass
              return []

          def steam_items():
              url = "https://store.steampowered.com/api/featuredcategories?cc=cn&l=schinese"
              try:
                  obj = json.loads(http_get(url, timeout=18))
                  top = obj.get("top_sellers", {}).get("items", [])
                  names = [clean(x.get("name")) for x in top if clean(x.get("name"))][:3]
                  if names:
                      return [f"游戏：Steam 热销榜前列包括《{'》《'.join(names[:3])}》"]
              except Exception:
                  pass
              return []

          def build_content():
              now = datetime.now(BEIJING)
              lines = ["每日轻量晨报", date_line(now), weather_line()]
              items = []
              items.extend(calendar_items(now))
              items.extend(football_items(now))
              items.extend(local_life_items(now))
              items.extend(tech_items(now))
              items.extend(epic_items(now))
              items.extend(steam_items())
              items = siliconflow_translate(items)
              if not items:
                  items.append("今日暂无稳定来源返回的高质量更新，先不硬凑内容")
              for i, item in enumerate(items[:10], 1):
                  lines.append(f"{i}、{item}；")
              return "\n".join(lines)

          def send_wecom(content):
              if not WECOM_WEBHOOK:
                  raise RuntimeError("缺少 GitHub Secret：WECOM_WEBHOOK")
              raw = post_json(WECOM_WEBHOOK, {"msgtype":"markdown","markdown":{"content":content}})
              print(raw)
              if json.loads(raw).get("errcode") != 0:
                  raise RuntimeError("企业微信返回失败：" + raw)

          print("脚本版本：light-brief-v2")
          content = build_content()
          print(content)
          send_wecom(content)
          PY
