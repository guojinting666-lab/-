name: Daily Light Brief

on:
  workflow_dispatch:
  schedule:
    # 00:07 UTC = 08:07 Beijing time. Avoid GitHub Actions top-of-hour congestion.
    - cron: "7 0 * * *"

jobs:
  send-brief:
    runs-on: ubuntu-latest
    steps:
      - name: Generate minimal brief and push to WeCom
        env:
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
          PYTHONIOENCODING: utf-8
        run: |
          python - <<'PY'
          import json
          import os
          import time
          import urllib.request
          from datetime import datetime, timedelta, timezone

          BEIJING = timezone(timedelta(hours=8))
          WECOM_WEBHOOK = os.environ.get("WECOM_WEBHOOK")

          WEEKDAYS = ["星期一", "星期二", "星期三", "星期四", "星期五", "星期六", "星期日"]
          CN_MONTHS = ["一月", "二月", "三月", "四月", "五月", "六月", "七月", "八月", "九月", "十月", "十一月", "十二月"]
          CN_DAYS = ["", "一日", "二日", "三日", "四日", "五日", "六日", "七日", "八日", "九日", "十日", "十一日", "十二日", "十三日", "十四日", "十五日", "十六日", "十七日", "十八日", "十九日", "二十日", "二十一日", "二十二日", "二十三日", "二十四日", "二十五日", "二十六日", "二十七日", "二十八日", "二十九日", "三十日", "三十一日"]
          WEATHER_CODES = {0:"晴",1:"大部晴朗",2:"局部多云",3:"阴",45:"雾",48:"雾凇",51:"小毛毛雨",53:"毛毛雨",55:"较强毛毛雨",61:"小雨",63:"中雨",65:"大雨",71:"小雪",73:"中雪",75:"大雪",80:"阵雨",81:"较强阵雨",82:"强阵雨",95:"雷阵雨"}
          SOLAR_TERM_NAMES = ["小寒","大寒","立春","雨水","惊蛰","春分","清明","谷雨","立夏","小满","芒种","夏至","小暑","大暑","立秋","处暑","白露","秋分","寒露","霜降","立冬","小雪","大雪","冬至"]
          SOLAR_TERM_INFO = [0,21208,42467,63836,85337,107014,128867,150921,173149,195551,218072,240693,263343,285989,308563,331033,353350,375494,397447,419210,440795,462224,483532,504758]
          LUNAR_INFO = [
              0x04bd8,0x04ae0,0x0a570,0x054d5,0x0d260,0x0d950,0x16554,0x056a0,0x09ad0,0x055d2,
              0x04ae0,0x0a5b6,0x0a4d0,0x0d250,0x1d255,0x0b540,0x0d6a0,0x0ada2,0x095b0,0x14977,
              0x04970,0x0a4b0,0x0b4b5,0x06a50,0x06d40,0x1ab54,0x02b60,0x09570,0x052f2,0x04970,
              0x06566,0x0d4a0,0x0ea50,0x06e95,0x05ad0,0x02b60,0x186e3,0x092e0,0x1c8d7,0x0c950,
              0x0d4a0,0x1d8a6,0x0b550,0x056a0,0x1a5b4,0x025d0,0x092d0,0x0d2b2,0x0a950,0x0b557,
              0x06ca0,0x0b550,0x15355,0x04da0,0x0a5d0,0x14573,0x052d0,0x0a9a8,0x0e950,0x06aa0,
              0x0aea6,0x0ab50,0x04b60,0x0aae4,0x0a570,0x05260,0x0f263,0x0d950,0x05b57,0x056a0,
              0x096d0,0x04dd5,0x04ad0,0x0a4d0,0x0d4d4,0x0d250,0x0d558,0x0b540,0x0b5a0,0x195a6,
              0x095b0,0x049b0,0x0a974,0x0a4b0,0x0b27a,0x06a50,0x06d40,0x0af46,0x0ab60,0x09570,
              0x04af5,0x04970,0x064b0,0x074a3,0x0ea50,0x06b58,0x05ac0,0x0ab60,0x096d5,0x092e0,
              0x0c960,0x0d954,0x0d4a0,0x0da50,0x07552,0x056a0,0x0abb7,0x025d0,0x092d0,0x0cab5,
              0x0a950,0x0b4a0,0x0baa4,0x0ad50,0x055d9,0x04ba0,0x0a5b0,0x15176,0x052b0,0x0a930,
              0x07954,0x06aa0,0x0ad50,0x05b52,0x04b60,0x0a6e6,0x0a4e0,0x0d260,0x0ea65,0x0d530,
              0x05aa0,0x076a3,0x096d0,0x04bd7,0x04ad0,0x0a4d0,0x1d0b6,0x0d250,0x0d520,0x0dd45,
              0x0b5a0,0x056d0,0x055b2,0x049b0,0x0a577,0x0a4b0,0x0aa50,0x1b255,0x06d20,0x0ada0
          ]
          LUNAR_MONTHS = ["正月","二月","三月","四月","五月","六月","七月","八月","九月","十月","冬月","腊月"]
          LUNAR_DAYS = ["初一","初二","初三","初四","初五","初六","初七","初八","初九","初十","十一","十二","十三","十四","十五","十六","十七","十八","十九","二十","廿一","廿二","廿三","廿四","廿五","廿六","廿七","廿八","廿九","三十"]

          def http_get(url, timeout=20):
              req = urllib.request.Request(url, headers={"User-Agent": "daily-light-brief/1.0"})
              with urllib.request.urlopen(req, timeout=timeout) as r:
                  return r.read().decode("utf-8", "ignore")

          def post_json(url, payload, timeout=60):
              data = json.dumps(payload, ensure_ascii=False).encode("utf-8")
              req = urllib.request.Request(url, data=data, headers={"Content-Type": "application/json"}, method="POST")
              with urllib.request.urlopen(req, timeout=timeout) as r:
                  return r.read().decode("utf-8", "ignore")

          def date_line(now):
              return f"📆{CN_MONTHS[now.month-1]}{CN_DAYS[now.day]}  {WEEKDAYS[now.weekday()]}"

          def solar_terms(year):
              base = datetime(1900, 1, 6, 2, 5, tzinfo=timezone.utc)
              result = []
              for i, name in enumerate(SOLAR_TERM_NAMES):
                  minutes = 525948.76 * (year - 1900) + SOLAR_TERM_INFO[i]
                  day = (base + timedelta(minutes=minutes)).astimezone(BEIJING).date()
                  result.append((day, name))
              return result

          def lunar_year_days(year):
              total = 348
              info = LUNAR_INFO[year - 1900]
              mask = 0x8000
              for _ in range(12):
                  if info & mask:
                      total += 1
                  mask >>= 1
              return total + leap_days(year)

          def leap_month(year):
              return LUNAR_INFO[year - 1900] & 0xf

          def leap_days(year):
              if leap_month(year):
                  return 30 if (LUNAR_INFO[year - 1900] & 0x10000) else 29
              return 0

          def lunar_month_days(year, month):
              return 30 if (LUNAR_INFO[year - 1900] & (0x10000 >> month)) else 29

          def lunar_date_text(day):
              base = datetime(1900, 1, 31, tzinfo=BEIJING).date()
              offset = (day - base).days
              year = 1900
              while year < 2100:
                  days = lunar_year_days(year)
                  if offset < days:
                      break
                  offset -= days
                  year += 1
              leap = leap_month(year)
              month = 1
              is_leap = False
              while month <= 12:
                  days = leap_days(year) if is_leap else lunar_month_days(year, month)
                  if offset < days:
                      break
                  offset -= days
                  if leap == month and not is_leap:
                      is_leap = True
                  else:
                      if is_leap:
                          is_leap = False
                      month += 1
              prefix = "闰" if is_leap else ""
              return f"农历{prefix}{LUNAR_MONTHS[month-1]}{LUNAR_DAYS[offset]}"

          def calendar_item(now):
              today = now.date()
              terms = sorted(solar_terms(today.year - 1) + solar_terms(today.year) + solar_terms(today.year + 1))
              current = ""
              for day, name in terms:
                  if day <= today:
                      current = name
                  else:
                      break
              bits = [lunar_date_text(today)]
              if current:
                  bits.append(f"当前处于{current}节气")
              for day, name in terms:
                  diff = (day - today).days
                  if diff == 0:
                      bits.append(f"今天是{name}")
                      return "日历节气：" + "；".join(bits)
                  if 0 < diff <= 16:
                      bits.append(f"距离{name}还有{diff}天")
                      return "日历节气：" + "；".join(bits)
              return "日历节气：" + "；".join(bits)

          def uv_note(v):
              if v is None:
                  return ""
              v = float(v)
              if v < 3:
                  return "紫外线较弱"
              if v < 6:
                  return "紫外线中等，久待户外建议防晒"
              if v < 8:
                  return "紫外线较强，建议防晒"
              return "紫外线很强，尽量减少暴晒"

          def aqi_note(v):
              if v is None:
                  return ""
              v = float(v)
              if v <= 50:
                  return "空气好，适合户外"
              if v <= 100:
                  return "空气可接受"
              if v <= 150:
                  return "轻度污染，敏感人群少久待户外"
              if v <= 200:
                  return "中度污染，建议减少户外运动"
              return "污染较重，尽量减少户外活动"

          def pm25_note(v):
              if v is None:
                  return ""
              v = float(v)
              if v <= 35:
                  return "PM2.5较低"
              if v <= 75:
                  return "PM2.5偏高，敏感人群注意"
              return "PM2.5较高，建议减少户外暴露"

          def weather_item():
              url = "https://api.open-meteo.com/v1/forecast?latitude=30.2741&longitude=120.1551&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Asia%2FShanghai&forecast_days=2"
              d = json.loads(http_get(url, 25)).get("daily", {})
              code = int((d.get("weather_code") or [3])[0])
              desc = WEATHER_CODES.get(code, "天气待查")
              high = round(float((d.get("temperature_2m_max") or [0])[0]))
              low = round(float((d.get("temperature_2m_min") or [0])[0]))
              pop = (d.get("precipitation_probability_max") or [None])[0]
              tomorrow_code = int((d.get("weather_code") or [3,3])[1])
              tomorrow_desc = WEATHER_CODES.get(tomorrow_code, "天气待查")
              tomorrow_high = round(float((d.get("temperature_2m_max") or [0,0])[1]))
              tomorrow_low = round(float((d.get("temperature_2m_min") or [0,0])[1]))
              rain_codes = [51,53,55,61,63,65,80,81,82,95]
              advice = "建议带伞" if code in rain_codes or (pop is not None and int(pop) >= 50) else "适合正常出行"

              parts = [f"今天杭州{desc}，{low}℃～{high}℃，{advice}"]
              if pop is not None:
                  parts.append(f"降水概率{int(pop)}%")

              return "天气：" + "，".join(parts) + f"；明天{tomorrow_desc}，{tomorrow_low}℃～{tomorrow_high}℃"

          def build_content():
              now = datetime.now(BEIJING)
              lines = [
                  "每日轻量晨报",
                  date_line(now),
                  f"1、{weather_item()}；",
                  f"2、{calendar_item(now)}；",
              ]
              return "\n".join(lines)

          def send_wecom(content):
              if not WECOM_WEBHOOK:
                  raise RuntimeError("缺少 GitHub Secret：WECOM_WEBHOOK")
              payload = {"msgtype": "markdown", "markdown": {"content": content}}
              raw = post_json(WECOM_WEBHOOK, payload, timeout=90)
              print(raw)
              if json.loads(raw).get("errcode") != 0:
                  raise RuntimeError("企业微信发送失败：" + raw)

          print("SCRIPT_VERSION: light-brief-v18-no-duplicate")
          content = build_content()
          print(content)
          send_wecom(content)
          PY
