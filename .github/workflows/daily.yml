                  "多地文旅部门加密暑期活动供给，夜游、演出和城市漫步成为消费重点",
                  "AI硬件和端侧模型持续更新，手机、电脑和可穿戴设备加速接入智能功能",
                  "海外市场继续关注中东局势变化，航运、能源和出行安全风险上升",
                  "国内平台优化即时零售和本地生活服务，配送、到店和会员权益继续升级",
                  "电影和演出市场进入暑期档，年轻观众带动线下娱乐消费回暖",
                  "多地加强高温、降雨和强对流天气预警，出行和户外活动需关注临近提醒",
                  "高校毕业季带动租房、招聘和城市服务需求上升，多地推出就业配套措施",
                  "主要科技企业继续加码机器人和智能驾驶，应用场景从展示走向商业落地",
                  "跨境电商和海淘服务继续下沉，物流时效、售后和线下体验成为竞争重点",
                  "城市商圈加快改造存量空间，餐饮、展览和运动体验成为引流重点",
              ][:15-len(titles)])
          titles = titles[:15]
          content = format_content(now, weather, titles)
          print(content)
          send_wecom(content)
