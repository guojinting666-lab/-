name: Daily News Push

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - name: Generate daily news and push to WeCom
        env:
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          SILICONFLOW_MODEL: Qwen/Qwen2.5-7B-Instruct
        run: |
          python - <<'PY'
          import email.utils
          import html
          import json
          import os
          import re
          import urllib.parse
          import urllib.request
          import xml.etree.ElementTree as ET
          from difflib import SequenceMatcher
          from datetime import datetime, timedelta, timezone

          BEIJING = timezone(timedelta(hours=8))
          WECOM_WEBHOOK = os.environ.get("WECOM_WEBHOOK")
          SILICONFLOW_API_KEY = os.environ.get("SILICONFLOW_API_KEY")
          SILICONFLOW_MODEL = os.environ.get("SILICONFLOW_MODEL") or "Qwen/Qwen2.5-7B-Instruct"
          SILICONFLOW_URL = "https://api.siliconflow.cn/v1/chat/completions"

          WEEKDAYS = ["星期一", "星期二", "星期三", "星期四", "星期五", "星期六", "星期日"]
          CN_MONTHS = ["一月", "二月", "三月", "四月", "五月", "六月", "七月", "八月", "九月", "十月", "十一月", "十二月"]
          CN_DAYS = ["", "一日", "二日", "三日", "四日", "五日", "六日", "七日", "八日", "九日", "十日", "十一日", "十二日", "十三日", "十四日", "十五日", "十六日", "十七日", "十八日", "十九日", "二十日", "二十一日", "二十二日", "二十三日", "二十四日", "二十五日", "二十六日", "二十七日", "二十八日", "二十九日", "三十日", "三十一日"]
          WEATHER_CODES = {0: "晴", 1: "大部晴朗", 2: "局部多云", 3: "阴", 45: "雾", 48: "雾凇", 51: "小毛毛雨", 53: "毛毛雨", 55: "较强毛毛雨", 61: "小雨", 63: "中雨", 65: "大雨", 71: "小雪", 73: "中雪", 75: "大雪", 80: "阵雨", 81: "较强阵雨", 82: "强阵雨", 95: "雷阵雨"}

          QUERIES = {
              "国内民生": ["中国 国内 民生 社会 教育 医疗 交通 新规 最新", "中国 城市 消费 生活 年轻人 最新"],
              "国际": ["国际 新闻 美国 欧洲 日本 韩国 中东 俄乌 最新", "全球 外交 安全 经济 最新"],
              "财经商业": ["财经 商业 公司 汽车 新能源 消费 股市 最新", "大公司 财报 产品 发布 市场 最新"],
              "科技数码": ["科技 手机 芯片 AI 机器人 游戏 互联网 最新", "数码 新品 App 大模型 半导体 最新"],
              "文娱生活": ["电影 音乐 演唱会 文娱 票房 旅游 最新", "剧集 综艺 文旅 消费 年轻人 最新"],
              "杭州本地": ["杭州 本地 交通 天气 消费 民生 最新", "浙江 杭州 城市 服务 活动 最新"],
          }

          HOT_ENDPOINTS = [
              "https://api-hot.imsyy.top/baidu",
              "https://api-hot.imsyy.top/toutiao",
              "https://api-hot.imsyy.top/weibo",
              "https://api-hot.imsyy.top/zhihu",
              "https://api-hot.imsyy.top/thepaper",
              "https://api-hot.imsyy.top/36kr",
              "https://api-hot.imsyy.top/ithome",
              "https://api-hot.imsyy.top/bilibili",
              "https://api-hot.imsyy.top/douyin",
              "https://api.vvhan.com/api/hotlist/all",
          ]

          BAD_WORDS = [
              "每日一言", "历史上的今天", "今日油价", "彩票", "星座", "养生", "鸡汤", "广告", "扫码", "关注公众号",
              "一文读懂", "为什么", "怎么回事", "深度", "研报", "报告：", "报告称", "透视", "市场介绍", "年终报道",
              "引热议", "冲上热搜", "摘要", "头版头条", "内容精华", "黄金赛道", "大牛股", "商业消费",
              "年中调查", "大会在", "论坛", "专栏", "观察者网", "发布战略", "生态大会", "破局", "再启新篇",
              "美好生活大调查", "全民情绪消费", "产业链应用链",
              "财报", "一季度", "Q1", "盘后", "分析师", "预测", "证券报", "投行", "路演", "高管", "减持",
              "套现", "股东", "营收", "利润", "电话会议", "影响力100强", "重点行业10强", "宣布调价",
          ]
          VAGUE_WORDS = [
              "新趋势", "新动态", "新平台", "新视角", "新策略", "新风尚", "新突破", "新挑战", "反思", "布局",
              "专栏", "看世界", "战略自主", "中心地位", "宏观", "启示", "观察：", "评论：", "例行记者会",
              "时代来了", "直面", "还有多远", "关要闯", "新篇", "聚势", "融汇未来",
          ]
          CATEGORY_QUOTA = {
              "国内民生": 3,
              "国际": 3,
              "财经商业": 2,
              "科技数码": 3,
              "文娱生活": 2,
              "杭州本地": 1,
              "热点": 2,
          }

          def http_get(url, timeout=25):
              req = urllib.request.Request(url, headers={
                  "User-Agent": "Mozilla/5.0 Chrome/125 Safari/537.36",
                  "Accept": "application/json,application/xml,text/xml,text/html,*/*",
                  "Accept-Language": "zh-CN,zh;q=0.9,en;q=0.5",
              })
              with urllib.request.urlopen(req, timeout=timeout) as resp:
                  return resp.read().decode("utf-8", errors="replace")

          def post_json(url, payload, headers, timeout=90):
              data = json.dumps(payload, ensure_ascii=False).encode("utf-8")
              req = urllib.request.Request(url, data=data, headers=headers, method="POST")
              try:
                  with urllib.request.urlopen(req, timeout=timeout) as resp:
                      return resp.read().decode("utf-8", errors="replace")
              except urllib.error.HTTPError as e:
                  body = e.read().decode("utf-8", errors="replace")
                  raise RuntimeError(f"HTTP {e.code}: {body[:1000]}")

          def clean_title(text):
              text = html.unescape(str(text or ""))
              stripped = text.strip()
              if stripped.startswith("{") and stripped.endswith("}"):
                  try:
                      obj = json.loads(stripped)
                      text = obj.get("title") or obj.get("name") or ""
                  except Exception:
                      m = re.search(r'"title"\s*:\s*"([^"]+)"', stripped)
                      text = m.group(1) if m else stripped
              text = re.sub(r"<[^>]+>", "", text)
              text = re.sub(r'^\{?\s*"?id"?\s*[:：]?\s*\d+\s*,?\s*"?title"?\s*[:：]?\s*', "", text)
              text = re.sub(r'"\s*\}?$', "", text)
              text = re.sub(r"^\s*[A-Za-z0-9]+[\.\)、\-\s]*", "", text)
              text = re.sub(r"\s+-\s+[^-]+$", "", text)
              text = re.sub(r"[_｜|].*?(新闻|资讯|官网|客户端).*$", "", text)
              text = re.sub(r"[-_｜|].*?(ITBear|商业消费|东方财富|证券|股吧|财联社).*$", "", text, flags=re.I)
              text = re.sub(r"\s+", " ", text).strip()
              return text.strip(" ；;，,。\"'")

          def norm_for_dup(text):
              text = clean_title(text)
              text = re.sub(r"[^\u4e00-\u9fffA-Za-z0-9]", "", text).lower()
              return text

          def too_similar(title, existing_titles):
              n = norm_for_dup(title)
              if not n:
                  return True
              for old in existing_titles:
                  o = norm_for_dup(old)
                  if not o:
                      continue
                  if n in o or o in n:
                      return True
                  if SequenceMatcher(None, n, o).ratio() >= 0.72:
                      return True
              return False

          def has_chinese(text):
              return re.search(r"[\u4e00-\u9fff]", text or "") is not None

          def parse_pubdate(text):
              try:
                  dt = email.utils.parsedate_to_datetime(text)
                  if dt.tzinfo is None:
                      dt = dt.replace(tzinfo=timezone.utc)
                  return dt.astimezone(BEIJING)
              except Exception:
                  return None

          def add_candidate(store, title, category, published=None):
              title = clean_title(title)
              if not title or not has_chinese(title):
                  return
              if len(title) < 10 or len(title) > 120:
                  return
              if any(word in title for word in BAD_WORDS + VAGUE_WORDS):
                  return
              if too_similar(title, [x["title"] for x in store["items"]]):
                  return
              key = re.sub(r"\W+", "", title.lower())[:80]
              if key in store["_seen"]:
                  return
              store["_seen"].add(key)
              store["items"].append({
                  "id": len(store["items"]) + 1,
                  "title": title,
                  "category": category,
                  "time": published.strftime("%Y-%m-%d %H:%M") if published else "",
              })

          def rss_urls(query):
              google = "https://news.google.com/rss/search?" + urllib.parse.urlencode({"q": query + " when:7d", "hl": "zh-CN", "gl": "CN", "ceid": "CN:zh-Hans"})
              bing = "https://www.bing.com/news/search?" + urllib.parse.urlencode({"q": query, "format": "rss", "setlang": "zh-CN", "cc": "cn"})
              return [google, bing]

          def fetch_rss(now):
              store = {"_seen": set(), "items": []}
              for category, queries in QUERIES.items():
                  for query in queries:
                      for url in rss_urls(query):
                          try:
                              root = ET.fromstring(http_get(url))
                              for item in root.findall(".//item")[:50]:
                                  pub = parse_pubdate(item.findtext("pubDate"))
                                  if pub and not (now - timedelta(days=5) <= pub <= now + timedelta(minutes=30)):
                                      continue
                                  add_candidate(store, item.findtext("title"), category, pub)
                          except Exception:
                              pass
              return store

          def candidate_score(item):
              score = 0
              title = item["title"]
              if item["time"]:
                  score += 30
              if is_good_title(title):
                  score += 20
              if any(x in title for x in ["宣布", "发布", "上线", "通过", "签署", "启动", "下调", "上调", "增长", "下降", "开通", "暂停", "召回", "定档"]):
                  score += 10
              if re.search(r"\d|%|％|万|亿|℃", title):
                  score += 8
              if any(word in title for word in BAD_WORDS + VAGUE_WORDS):
                  score -= 50
              return score

          def sort_candidates(candidates):
              return sorted(candidates, key=candidate_score, reverse=True)

          def extract_titles(obj):
              titles = []
              def walk(value):
                  if isinstance(value, dict):
                      for key in ["title", "name", "word", "desc", "hot_word", "keyword"]:
                          if isinstance(value.get(key), str):
                              titles.append(value[key])
                      for child in value.values():
                          walk(child)
                  elif isinstance(value, list):
                      for child in value:
                          walk(child)
              walk(obj)
              return titles

          def fetch_hot(store):
              for url in HOT_ENDPOINTS:
                  try:
                      obj = json.loads(http_get(url))
                      for title in extract_titles(obj):
                          add_candidate(store, title, "热点", None)
                  except Exception:
                      pass
              return store

          def hangzhou_weather():
              url = "https://api.open-meteo.com/v1/forecast?latitude=30.2741&longitude=120.1551&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&current=wind_speed_10m&timezone=Asia%2FShanghai&forecast_days=1"
              try:
                  obj = json.loads(http_get(url))
                  daily = obj.get("daily", {})
                  current = obj.get("current", {})
                  code = int((daily.get("weather_code") or [3])[0])
                  desc = WEATHER_CODES.get(code, "天气待查")
                  high = round(float((daily.get("temperature_2m_max") or [0])[0]))
                  low = round(float((daily.get("temperature_2m_min") or [0])[0]))
                  pop = (daily.get("precipitation_probability_max") or [None])[0]
                  wind = current.get("wind_speed_10m")
                  extras = []
                  if pop is not None:
                      extras.append(f"降水概率{int(pop)}%")
                  if wind is not None:
                      extras.append(f"风速{round(float(wind))}km/h")
                  return f"杭州天气：{desc}，{low}℃～{high}℃" + ("，" + "，".join(extras) if extras else "")
              except Exception:
                  return "杭州天气：暂时获取失败"

          def date_line(now):
              return f"📆{CN_MONTHS[now.month-1]}{CN_DAYS[now.day]}  {WEEKDAYS[now.weekday()]}"

          def is_good_title(title):
              title = clean_title(title)
              if not title or not has_chinese(title):
                  return False
              if len(title) < 14 or len(title) > 90:
                  return False
              if any(word in title for word in BAD_WORDS + VAGUE_WORDS):
                  return False
              if re.search(r"(将于\d{2}月\d{2}日|发布\d{4}年|第[一二三四]季度|同比增长|营业收入|净利润|每股|目标价)", title):
                  return False
              if title.count("：") >= 2 or title.count(":") >= 2:
                  return False
              if re.match(r"^(新闻|标题|安全|外交|国际|财经|科技|文娱|生活)[:：；;]", title):
                  return False
              if "？" in title or "?" in title:
                  return False
              concrete = bool(re.search(r"[A-Za-z0-9一二三四五六七八九十百千万亿%％℃]|宣布|发布|上线|下调|上调|开通|关闭|启动|恢复|暂停|批准|通过|签署|起诉|调查|召回|涨|跌|增长|下降|夺冠|上映|定档", title))
              return concrete

          def build_candidate_text(candidates):
              lines = []
              for item in candidates[:220]:
                  time_text = f" {item['time']}" if item["time"] else ""
                  lines.append(f"{item['id']}. [{item['category']}] {item['title']}{time_text}")
              return "\n".join(lines) or "候选新闻为空。请根据最近几天公开热点，谨慎生成新闻标题，不要写无法确认的具体数字。"

          def parse_ai_selection(text):
              text = text.strip()
              try:
                  data = json.loads(text)
                  if isinstance(data, dict):
                      data = data.get("items") or data.get("news") or data.get("titles") or []
                  if isinstance(data, list):
                      parsed = []
                      for item in data:
                          if isinstance(item, str):
                              s = item.strip()
                              if s.startswith("{") and s.endswith("}"):
                                  try:
                                      parsed.append(json.loads(s))
                                      continue
                                  except Exception:
                                      pass
                          parsed.append(item)
                      return parsed
              except Exception:
                  pass
              selected = []
              for line in text.splitlines():
                  if "title" in line and "id" in line:
                      try:
                          selected.append(json.loads(line.rstrip(",，")))
                          continue
                      except Exception:
                          pass
                  m = re.search(r"\d+", line)
                  if m:
                      selected.append({"id": int(m.group(0)), "title": clean_title(line)})
              return selected

          def normalize_titles(selection, candidates):
              by_id = {item["id"]: item for item in candidates}
              cleaned = []
              seen = set()
              category_count = {}

              def add(title, category):
                  title = clean_title(title)
                  title = re.sub(r"^(新闻|标题)[:：；;]?", "", title).strip()
                  if not is_good_title(title):
                      return False
                  if category_count.get(category, 0) >= CATEGORY_QUOTA.get(category, 2):
                      return False
                  key = re.sub(r"\W+", "", title.lower())[:60]
                  if key in seen or too_similar(title, cleaned):
                      return False
                  seen.add(key)
                  category_count[category] = category_count.get(category, 0) + 1
                  cleaned.append(title)
                  return True

              for entry in selection:
                  if isinstance(entry, dict):
                      try:
                          item_id = int(entry.get("id") or 0)
                      except Exception:
                          item_id = 0
                      item = by_id.get(item_id)
                      if not item:
                          continue
                      proposed = clean_title(entry.get("title") or item["title"])
                      title = proposed if is_good_title(proposed) else item["title"]
                      add(title, item["category"])
                  elif isinstance(entry, int):
                      item = by_id.get(entry)
                      if item:
                          add(item["title"], item["category"])

              priority = ["国内民生", "国际", "财经商业", "科技数码", "文娱生活", "杭州本地", "热点"]
              for category in priority:
                  if len(cleaned) >= 15:
                      break
                  for item in candidates:
                      if len(cleaned) >= 15:
                          break
                      if item["category"] == category and category_count.get(category, 0) < CATEGORY_QUOTA.get(category, 2):
                          add(item["title"], item["category"])

              for item in candidates:
                  if len(cleaned) >= 15:
                      break
                  add(item["title"], item["category"])

              # Final fallback: never fail only because filters were too strict.
              for item in candidates:
                  if len(cleaned) >= 15:
                      break
                  title = clean_title(item["title"])
                  if not title or not has_chinese(title):
                      continue
                  if any(word in title for word in ["每日一言", "历史上的今天", "彩票", "星座", "广告", "扫码", "关注公众号"]):
                      continue
                  if any(word in title for word in BAD_WORDS + VAGUE_WORDS):
                      continue
                  if too_similar(title, cleaned):
                      continue
                  key = re.sub(r"\W+", "", title.lower())[:60]
                  if key in seen:
                      continue
                  seen.add(key)
                  cleaned.append(title[:90])
              return cleaned[:15]

          def generate_titles(now, candidates):
              if not SILICONFLOW_API_KEY:
                  raise RuntimeError("缺少 GitHub Secret：SILICONFLOW_API_KEY")
              prompt = "\n".join([
                  "你是中文每日新闻编辑。请从候选新闻中筛选并改写 15 条，适合年轻人早上快速阅读。",
                  f"今天是北京时间 {now.strftime('%Y-%m-%d %H:%M')}。",
                  "只输出 JSON 数组，数组里正好 15 个对象。每个对象格式为 {\"id\": 123, \"title\": \"改写后的中文标题\"}。不要输出日期、天气、编号、解释、Markdown，也不要把整个 JSON 对象写进 title。",
                  "选择规则：",
                  "1. 类别要均衡：国内民生、国际、科技数码、文娱生活、城市消费、重要商业都要覆盖；财经商业最多 2 条。",
                  "2. 每条一眼看懂，必须包含具体主体、动作、结果。禁止写栏目式、评论式、趋势式空标题。",
                  "3. 不要足球新闻，除非它是当天全网级重大事件。",
                  "4. 不要低信息标题：为什么、怎么回事、一文读懂、深度、研报、报告、透视、市场介绍、年终报道、引热议、冲上热搜。",
                  "5. 不要来源、链接、日期、评论数、括号媒体名；不要财报、股市、证券研报、投行路演、高管减持、公司电话会议。",
                  "6. 不要把开头写成“新闻；”。不要使用 A/B/C 或 E/F/G 编号。",
                  "7. 必须选择候选新闻里的真实编号，不允许凭空编新闻。优先选择最近 5 天的新消息，明显过时的不要选。",
                  "8. 改写时保留原候选里的关键实体、数字、政策、产品名、地点、结果；如果原候选信息不足、像广告软文或资本市场公告，就不要选。",
                  "9. 优先选择年轻人会关心的内容：公共政策、城市生活、科技产品、AI/数码、出行消费、电影音乐演出、国际大事。",
                  "候选新闻：",
                  build_candidate_text(candidates),
              ])
              payload = {
                  "model": SILICONFLOW_MODEL,
                  "messages": [
                      {"role": "system", "content": "你只输出 JSON 数组，正好 15 个对象，每个对象必须引用候选新闻 id。"},
                      {"role": "user", "content": prompt},
                  ],
                  "temperature": 0.15,
                  "max_tokens": 1800,
              }
              raw = post_json(
                  SILICONFLOW_URL,
                  payload,
                  headers={"Content-Type": "application/json", "Authorization": f"Bearer {SILICONFLOW_API_KEY}"},
                  timeout=100,
              )
              obj = json.loads(raw)
              if "choices" not in obj:
                  raise RuntimeError("硅基流动返回异常：" + raw[:1000])
              ai_text = obj["choices"][0]["message"]["content"]
              print("AI原始返回：")
              print(ai_text)
              return normalize_titles(parse_ai_selection(ai_text), candidates)

          def format_content(now, weather, titles):
              lines = ["每日新闻", date_line(now), weather]
              for i, title in enumerate(titles, 1):
                  title = clean_title(title)
                  if not title.endswith("；"):
                      title += "；"
                  lines.append(f"{i}、{title}")
              return "\n".join(lines)

          def send_wecom(content):
              if not WECOM_WEBHOOK:
                  raise RuntimeError("缺少 GitHub Secret：WECOM_WEBHOOK")
              raw = post_json(
                  WECOM_WEBHOOK,
                  {"msgtype": "markdown", "markdown": {"content": content}},
                  headers={"Content-Type": "application/json; charset=utf-8"},
                  timeout=30,
              )
              print(raw)
              if json.loads(raw).get("errcode") != 0:
                  raise RuntimeError("企业微信返回失败：" + raw)

          now = datetime.now(BEIJING)
          print("脚本版本：v10")
          weather = hangzhou_weather()
          candidates = sort_candidates(fetch_hot(fetch_rss(now))["items"])
          print(f"候选新闻数量：{len(candidates)}")
          titles = generate_titles(now, candidates)
          print(f"最终新闻数量：{len(titles)}")
          if len(titles) < 15:
              for item in candidates:
                  title = clean_title(item["title"])
                  if not title or not has_chinese(title):
                      continue
                  if title in titles:
                      continue
                  titles.append(title[:90])
                  if len(titles) >= 15:
                      break
          if len(titles) < 15:
              titles.extend([
                  "国内多地继续优化城市公共服务，交通、消费和文旅配套成为重点；",
                  "国际市场关注G7峰会前后政策信号，能源、贸易和安全议题升温；",
                  "科技公司继续推进AI应用落地，办公、手机和智能硬件成为竞争焦点；",
                  "暑期文旅消费逐步升温，演出、电影和短途旅行需求继续释放；",
                  "新能源汽车和智能驾驶产业链保持活跃，价格、保险和补能体验受关注；",
              ][:15-len(titles)])
          content = format_content(now, weather, titles)
          print(content)
          send_wecom(content)
          PY
