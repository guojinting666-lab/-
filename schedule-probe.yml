name: Schedule Probe

on:
  workflow_dispatch:
  schedule:
    # Temporary probe: run every 5 minutes.
    - cron: "*/5 * * * *"

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Print schedule probe time
        run: |
          echo "SCHEDULE_PROBE_VERSION=schedule-probe-v1"
          echo "UTC now: $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "Beijing now: $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S')"
